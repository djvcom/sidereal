receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  otlp/sidereal:
    endpoint: sidereal:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/sidereal]
    metrics:
      receivers: [otlp]
      exporters: [otlp/sidereal]
    logs:
      receivers: [otlp]
      exporters: [otlp/sidereal]
